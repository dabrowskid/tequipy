services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: tequipy
      POSTGRES_USER: tequipy
      POSTGRES_PASSWORD: tequipy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tequipy -d tequipy"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tequipy
      SPRING_DATASOURCE_USERNAME: tequipy
      SPRING_DATASOURCE_PASSWORD: tequipy
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
