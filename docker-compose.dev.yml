services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tequipy
      POSTGRES_USER: tequipy
      POSTGRES_PASSWORD: tequipy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tequipy -d tequipy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
